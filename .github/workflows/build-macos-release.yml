# ──────────────────────────────────────────────────────────────────────────────
#  Build Loop Breaker macOS Installer & Publish as Release
#  Triggered on push to main — creates/updates a GitHub release with the installer
# ──────────────────────────────────────────────────────────────────────────────
name: Build macOS Installer

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  build-macos-installer:
    runs-on: macos-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # Needed for version tags

      # ── Setup Python for manual generation ────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install fpdf2

      # ── Cache JUCE ────────────────────────────────────────────────────────
      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.6

      - name: Download JUCE 8.0.6
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/juce-framework/JUCE/releases/download/8.0.6/juce-8.0.6-osx.zip" -o juce.zip
          unzip -q juce.zip
          mv JUCE-* JUCE || mv juce-* JUCE || true
          rm juce.zip

      # ── Build with CMake (VST3, AU) ──────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_DIR="${{ github.workspace }}/JUCE"

      - name: Build VST3 and AU
        run: |
          cmake --build build --config Release --target LoopBreaker_VST3 --parallel
          cmake --build build --config Release --target LoopBreaker_AU --parallel

      # ── Prepare builds for installer ──────────────────────────────────────
      - name: Copy builds to expected locations
        run: |
          # Create the directory structure expected by build_installer.sh
          mkdir -p Builds/MacOSX/build/Release

          cp -R "build/LoopBreaker_artefacts/Release/VST3/Loop Breaker.vst3" Builds/MacOSX/build/Release/LoopBreaker.vst3
          cp -R "build/LoopBreaker_artefacts/Release/AU/Loop Breaker.component" Builds/MacOSX/build/Release/LoopBreaker.component

          # Verify builds exist
          echo "✅ VST3 builds:"
          ls -la build/LoopBreaker_artefacts/Release/VST3/
          echo "✅ AU builds:"
          ls -la build/LoopBreaker_artefacts/Release/AU/
          echo "✅ Xcode-compatible location:"
          ls -la Builds/MacOSX/build/Release/

      # ── Build Installer ───────────────────────────────────────────────────
      - name: Build macOS Installer
        run: |
          bash Installer/build_installer.sh --skip-build
        env:
          CMAKE_BUILD_DIR: ${{ github.workspace }}/build

      # ── Verify Installer Output ──────────────────────────────────────────
      - name: Verify installer zip exists
        run: |
          if [ ! -f "Installer/output/LoopBreaker-macOS-Installer.zip" ]; then
            echo "❌ Installer zip not found!"
            exit 1
          fi
          echo "✅ Installer zip created successfully"
          ls -lh Installer/output/LoopBreaker-macOS-Installer.zip

      # ── Create/Update Release ─────────────────────────────────────────────
      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Loop Breaker - Latest Build
          body: |
            # Loop Breaker - macOS Installer

            **Automated build from commit:** ${{ github.sha }}
            **Build date:** ${{ github.event.head_commit.timestamp }}

            ## Installation
            1. Download `LoopBreaker-macOS-Installer.zip`
            2. Extract the zip file
            3. Run `LoopBreaker-Installer.pkg`
            4. Follow the installation wizard

            ## What's Included
            - Loop Breaker VST3
            - Loop Breaker AU (Audio Unit)
            - Loop Breaker CLAP

            ---
            Latest commit: ${{ github.event.head_commit.message }}
          files: |
            Installer/output/LoopBreaker-macOS-Installer.zip
          draft: false
          prerelease: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload Build Artifact (backup) ────────────────────────────────────
      - name: User Manual PDFas workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoopBreaker-macOS-Installer
          path: Installer/output/LoopBreaker-macOS-Installer.zip
          if-no-files-found: error
